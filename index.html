<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Comercial — SeuBoné</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root, :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #0e1015;
    --card-bg: #171a21;
    --card-bg-2: #1d212b;
    --borda: #2a2f3a;
    --azul: #4f8cff;
    --azul-bg: rgba(79,140,255,0.14);
    --dourado: #ffcf33;
    --dourado-bg: rgba(255,207,51,0.14);
    --cinza: #9aa1ac;
    --cinza-bg: #20242e;
    --verde: #3ddc97;
    --verde-bg: rgba(61,220,151,0.14);
    --ambar: #fbbf24;
    --ambar-bg: rgba(251,191,36,0.14);
    --vermelho: #ff6b6b;
    --vermelho-bg: rgba(255,107,107,0.14);
    --texto: #f3f4f6;
    --texto-sub: #9aa1ac;
    --grid-linha: rgba(255,255,255,0.06);
    --destaque-vivo: #ffd400;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #f5f6f8;
    --card-bg: #ffffff;
    --card-bg-2: #f0f1f4;
    --borda: #e4e6ea;
    --azul: #1e40af;
    --azul-bg: #eaf1ff;
    --dourado: #b8860b;
    --dourado-bg: #fff7e0;
    --cinza: #6b7280;
    --cinza-bg: #eef0f3;
    --verde: #16a34a;
    --verde-bg: #ecfdf3;
    --ambar: #d97706;
    --ambar-bg: #fff8ec;
    --vermelho: #dc2626;
    --vermelho-bg: #fef2f2;
    --texto: #111827;
    --texto-sub: #6b7280;
    --grid-linha: rgba(0,0,0,0.08);
    --destaque-vivo: #ffd400;
  }
  body { transition: background-color .25s ease, color .25s ease; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--texto);
    padding: 22px 32px 32px;
  }
  .header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
  .header .logo { height: 42px; width:auto; display:block; margin-bottom:6px; }
  .header .brand-sub { font-size:13px; font-weight:700; letter-spacing:.1em; color:var(--texto-sub); text-transform:uppercase; }
  .header .semana { font-size:26px; font-weight:800; margin-top:2px; }
  .header .meta-info { text-align:right; font-size:14px; color:var(--texto-sub); }
  .grid { display:grid; grid-template-columns: repeat(12, 1fr); gap:16px; }
  .card { background:var(--card-bg); border:1px solid var(--borda); border-radius:18px; padding:20px 24px; }
  .card-label { font-size:13px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--texto-sub); margin-bottom:10px; display:flex; align-items:center; gap:7px; }
  .hero { grid-column: span 12; padding:28px 32px; }
  .hero-top { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:18px; }
  .hero-num { font-size:76px; font-weight:800; line-height:1; }
  .hero-sub { font-size:18px; color:var(--texto-sub); margin-top:8px; }
  .status-badge { display:inline-flex; align-items:center; gap:7px; padding:10px 16px; border-radius:999px; font-weight:700; font-size:15px; white-space:nowrap; }
  .status-vermelho { background:var(--vermelho-bg); color:var(--vermelho); }
  .status-ambar { background:var(--ambar-bg); color:var(--ambar); }
  .status-verde { background:var(--verde-bg); color:var(--verde); }
  .bar-wrap { position:relative; margin-top:22px; height:26px; background:var(--cinza-bg); border-radius:999px; overflow:visible; }
  .bar-fill { position:absolute; left:0; top:0; height:100%; border-radius:999px; transition:width .6s ease; }
  .bar-marker { position:absolute; top:-7px; bottom:-7px; width:3px; background:var(--dourado); }
  .bar-marker-label { position:absolute; top:-28px; transform:translateX(-50%); font-size:13px; font-weight:700; color:var(--dourado); white-space:nowrap; }
  .bar-legend { display:flex; justify-content:space-between; margin-top:10px; font-size:13px; color:var(--texto-sub); }
  .ladder { grid-column: span 12; }
  .ladder-row { display:flex; gap:12px; overflow-x:auto; padding-bottom:4px; }
  .chip { flex:1 1 0; min-width:120px; border-radius:14px; padding:12px 14px; text-align:center; border:1px solid var(--borda); background:var(--cinza-bg); }
  .chip.proximo { background:var(--dourado-bg); border-color:var(--dourado); }
  .chip .tier { font-size:13px; font-weight:700; color:var(--texto-sub); }
  .chip.proximo .tier { color:var(--dourado); }
  .chip .valor { font-size:17px; font-weight:800; margin-top:5px; }
  .rank-card { grid-column: span 6; position:relative; }
  .rank-card--destaque {
    border: 3px solid var(--destaque-vivo);
    box-shadow: inset 0 0 0 2px #000, 0 14px 34px rgba(0,0,0,0.28);
    padding: 30px 34px;
    min-height: 460px;
  }
  .rank-card--destaque .card-label { font-size:16px; margin-bottom:16px; }
  .rank-card--destaque .group-total .pct { font-size:46px; }
  .rank-card--destaque .group-total .desc { font-size:16px; }
  .rank-card--destaque .podium-row { padding:18px 0; gap:16px; }
  .rank-card--destaque .medal { width:42px; height:42px; font-size:17px; }
  .rank-card--destaque .avatar { width:44px; height:44px; font-size:16px; }
  .rank-card--destaque .p-nome { font-size:20px; }
  .rank-card--destaque .p-squad { font-size:14px; }
  .rank-card--destaque .p-pct { font-size:26px; }
  .rank-card .card-label .dot { width:9px; height:9px; border-radius:50%; display:inline-block; }
  .dot-azul { background:var(--azul); }
  .dot-dourado { background:var(--dourado); }
  .group-total { display:flex; align-items:baseline; gap:10px; margin-bottom:16px; padding-bottom:14px; border-bottom:1px dashed var(--borda); }
  .group-total .pct { font-size:34px; font-weight:800; }
  .group-total .desc { font-size:13px; color:var(--texto-sub); }
  .podium-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--borda); }
  .podium-row:last-child { border-bottom:none; }
  .medal { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; color:#161616; flex-shrink:0; }
  .medal-1 { background:#e9c542; }
  .medal-2 { background:#b7bec8; }
  .medal-3 { background:#c98a52; }
  .avatar { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; color:#101114; flex-shrink:0; }
  .avatar-azul { background: linear-gradient(135deg, var(--azul), #9cc0ff); }
  .avatar-dourado { background: linear-gradient(135deg, var(--dourado), #ffe38a); }
  .p-nome { font-weight:700; font-size:15px; }
  .p-squad { font-size:12px; color:var(--texto-sub); }
  .p-right { margin-left:auto; text-align:right; }
  .p-pct { font-weight:800; font-size:20px; }
  .chart-card { grid-column: span 12; }
  .chart-wrap { position:relative; height:320px; }
  .subcards-wrap { grid-column: span 12; display:flex; flex-wrap:wrap; align-items:flex-start; gap:16px; }
  .subcard { flex:1 1 240px; min-width:240px; background:var(--card-bg); border:1px solid var(--borda); border-radius:16px; padding:18px 20px; }
  .subcard-title { font-size:14px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:var(--texto-sub); margin-bottom:13px; }
  .subcard-row { display:flex; align-items:center; gap:11px; margin-bottom:12px; }
  .subcard-row:last-child { margin-bottom:0; }
  .subcard-avatar { width:30px; height:30px; border-radius:50%; background:var(--cinza-bg); color:var(--texto); font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .subcard-nome { font-size:15px; font-weight:600; width:130px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
  .subcard-bar-wrap { flex:1; height:12px; background:var(--cinza-bg); border-radius:999px; overflow:hidden; }
  .subcard-bar-fill { height:100%; border-radius:999px; }
  .subcard-pct { font-size:15px; font-weight:800; width:64px; text-align:right; flex-shrink:0; }

  .subcards-grid-topo {
    grid-column: span 12;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 18px;
    margin-top: 32px;
  }
  .subcards-grid-topo > .subcard:nth-child(1) { grid-column: 1; grid-row: 1; }
  .subcards-grid-topo > .subcard:nth-child(2) { grid-column: 2; grid-row: 1 / span 2; }
  .subcards-grid-topo > .subcard:nth-child(3) { grid-column: 3; grid-row: 1; }
  .subcards-grid-topo > .subcard:nth-child(4) { grid-column: 3; grid-row: 2; }
  .subcard--grande { min-width:0; padding:28px 32px; }
  .subcard--grande .subcard-title { font-size:17px; margin-bottom:18px; }
  .subcard--grande .subcard-row { gap:16px; margin-bottom:17px; }
  .subcard--grande .subcard-avatar { width:40px; height:40px; font-size:15px; }
  .subcard--grande .subcard-nome { font-size:19px; width:180px; }
  .subcard--grande .subcard-bar-wrap { height:15px; }
  .subcard--grande .subcard-pct { font-size:19px; width:76px; }

  .subcard--media { min-width:0; padding:20px 22px; }
  .subcard--media .subcard-title { font-size:14px; margin-bottom:13px; }
  .subcard--media .subcard-row { gap:10px; margin-bottom:12px; }
  .subcard--media .subcard-avatar { width:28px; height:28px; font-size:11px; }
  .subcard--media .subcard-nome { font-size:14px; width:112px; }
  .subcard--media .subcard-bar-wrap { height:10px; }
  .subcard--media .subcard-pct { font-size:14px; width:52px; }
  .footer { grid-column: span 12; font-size:12px; color:var(--texto-sub); text-align:center; margin-top:6px; }
  .empty-msg { padding:44px; text-align:center; color:var(--texto-sub); }
  .theme-toggle {
    margin-top: 8px;
    border: 1px solid var(--borda);
    background: var(--card-bg);
    color: var(--texto);
    font-size: 13px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 999px;
    cursor: pointer;
  }
  .theme-toggle:hover { border-color: var(--dourado); }
</style>
</head>
<body>

  <div class="header">
    <div>
      <img class="logo" src="logo.png" alt="SeuBoné">
      <div class="brand-sub">Painel Comercial</div>
      <div class="semana" id="semanaLabel">carregando…</div>
    </div>
    <div class="meta-info">
      <div id="diaLabel"></div>
      <div id="atualizadoLabel">última leitura: —</div>
      <button class="theme-toggle" id="btnTema" onclick="alternarTema()">☀️ Tema claro</button>
    </div>
  </div>

  <div id="conteudo" class="grid">
    <div class="empty-msg" style="grid-column: span 12;">Carregando dados da planilha…</div>
  </div>

<script>
// >>> URL do Apps Script (doGet) <<<
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx_8R_UGyyXDK68tazvTc9wj0-ECxbtCvHHOXArkAtvtTjX5uoe2kVCtnG2uxlkfkMxkA/exec?key=comercialpainel2026";

const REFRESH_MS = 10 * 60 * 1000; // 10 min
const CLOSER_SQUADS = ["FALCONS", "STARK"];
const GC_SQUADS = ["NEXUS", "MAVERICK"];
const EXCLUDE_SQUADS = ["TUBA", "SUPERNOVA", "BIGBANG", ""];

let chartCloser = null;
let chartGC = null;

function fmtBRL(v) {
  return "R$ " + Number(v || 0).toLocaleString("pt-BR", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtPct(v) {
  return (Number(v || 0) * 100).toLocaleString("pt-BR", { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + "%";
}
function toNum(v) {
  if (typeof v === "number") return v;
  const n = parseFloat(String(v || "").replace(",", "."));
  return isNaN(n) ? 0 : n;
}
function getInitials(nome) {
  return String(nome || "").trim().split(/\s+/).slice(0, 2).map(w => w[0]).join("").toUpperCase();
}
// Tira o código numérico do início (ex: "072026 SEMANA 4 (JUL)" -> "SEMANA 4 (JUL)")
function limparSemanaLabel(label) {
  const s = String(label || "");
  const idx = s.toUpperCase().indexOf("SEMANA");
  return idx >= 0 ? s.slice(idx).trim() : s.trim();
}

function parseDados(payload) {
  const rows = payload.rows || [];

  const weekRow = rows.find(r => r.some(c => typeof c === "string" && c.includes("Dia da semana atual")));
  const semanaLabel = weekRow ? weekRow[0] : "";
  let dia = null;
  if (weekRow) {
    const idx = weekRow.findIndex(c => typeof c === "string" && c.includes("Dia da semana atual"));
    dia = toNum(weekRow[idx + 1]);
  }

  const paceRow = rows.find(r => r.some(c => typeof c === "string" && c.includes("% de realização esperado")));
  let ritmoEsperado = null;
  if (paceRow) {
    const idx = paceRow.findIndex(c => typeof c === "string" && c.includes("% de realização esperado"));
    ritmoEsperado = toNum(paceRow[idx + 1]);
  }

  const headerIdx = rows.findIndex(r => r[0] === "Vendedor");
  const totalIdx = rows.findIndex(r => r[0] === "Total");
  const vendorRows = headerIdx >= 0 && totalIdx > headerIdx ? rows.slice(headerIdx + 1, totalIdx) : [];

  const vendedores = vendorRows
    .filter(r => r[0] && String(r[0]).trim() !== "")
    .map(r => ({
      nome: String(r[0]).trim(),
      meta: toNum(r[1]),
      fat: toNum(r[2]),
      pct: toNum(r[3]),
      squad: String(r[8] || "").trim().toUpperCase()
    }))
    .filter(v => !EXCLUDE_SQUADS.includes(v.squad));

  let totalMeta = 0, totalFat = 0;
  if (totalIdx >= 0) {
    totalMeta = toNum(rows[totalIdx][1]);
    totalFat = toNum(rows[totalIdx][2]);
  }

  return { semanaLabel, dia, ritmoEsperado, vendedores, totalMeta, totalFat };
}

function groupStats(vendedores, squads) {
  const grupo = vendedores.filter(v => squads.includes(v.squad));
  const meta = grupo.reduce((s, v) => s + v.meta, 0);
  const fat = grupo.reduce((s, v) => s + v.fat, 0);
  const pct = meta > 0 ? fat / meta : 0;
  const top3 = [...grupo].sort((a, b) => b.pct - a.pct).slice(0, 3);
  const todos = [...grupo].sort((a, b) => b.pct - a.pct);
  return { meta, fat, pct, top3, todos };
}

function statusFromRatio(ratio) {
  if (ratio >= 0.95) return "verde";
  if (ratio >= 0.7) return "ambar";
  return "vermelho";
}
function statusTexto(status) {
  if (status === "verde") return "NO RITMO";
  if (status === "ambar") return "ATENÇÃO";
  return "ATRASADO";
}
function statusIcone(status) {
  if (status === "verde") return "✅";
  if (status === "ambar") return "⚠️";
  return "🔴";
}
function statusCor(status) {
  if (status === "verde") return getComputedStyle(document.documentElement).getPropertyValue("--verde").trim();
  if (status === "ambar") return getComputedStyle(document.documentElement).getPropertyValue("--ambar").trim();
  return getComputedStyle(document.documentElement).getPropertyValue("--vermelho").trim();
}
function corTexto() { return getComputedStyle(document.documentElement).getPropertyValue("--texto").trim(); }
function corTextoSub() { return getComputedStyle(document.documentElement).getPropertyValue("--texto-sub").trim(); }
function corGrid() { return getComputedStyle(document.documentElement).getPropertyValue("--grid-linha").trim(); }

// ===== Tema claro/escuro =====
let ultimoDados = null; // guarda o último payload renderizado, pra poder redesenhar sem rebuscar dados

function aplicarTema(tema) {
  document.documentElement.setAttribute("data-theme", tema);
  const btn = document.getElementById("btnTema");
  if (btn) btn.textContent = tema === "dark" ? "☀️ Tema claro" : "🌙 Tema escuro";
  try { localStorage.setItem("painelTema", tema); } catch (e) { /* ambiente sem localStorage, segue sem salvar */ }
  if (ultimoDados) render(ultimoDados); // redesenha na hora com as cores certas, sem esperar o próximo refresh
}

function alternarTema() {
  const atual = document.documentElement.getAttribute("data-theme") || "dark";
  aplicarTema(atual === "dark" ? "light" : "dark");
}

(function iniciarTema() {
  let salvo = "dark";
  try { salvo = localStorage.getItem("painelTema") || "dark"; } catch (e) { /* ignora */ }
  document.documentElement.setAttribute("data-theme", salvo);
})();

function podiumHtml(top3, avatarClass) {
  if (!top3.length) return '<div class="empty-msg">Sem dados no período.</div>';
  const medals = ["medal-1", "medal-2", "medal-3"];
  const labels = ["1º", "2º", "3º"];
  return top3.map((v, i) => `
    <div class="podium-row">
      <div class="medal ${medals[i]}">${labels[i]}</div>
      <div class="avatar ${avatarClass}">${getInitials(v.nome)}</div>
      <div>
        <div class="p-nome">${v.nome}</div>
        <div class="p-squad">${v.squad}</div>
      </div>
      <div class="p-right">
        <div class="p-pct">${fmtPct(v.pct)}</div>
      </div>
    </div>
  `).join("");
}

// ===== Perfis de venda (categorias definidas pelo Felipe, independentes de squad) =====
// Layout em 3 linhas: grandes (30+/50+/300+) > hunter+farmers > resto (preenche o espaço)
const CATEGORIAS_TOPO = [
  { nome: "30+", membros: ["TAYNARA SOARES", "PAULO SERGIO", "VICTOR VARELA", "VICTOR BRITO"] },
  { nome: "50+", membros: ["EMILY DANTAS", "CAMILLA MARINHO", "JAILTON", "CAIO TARGINO", "IGOR NEVES", "HADYJA SARAIVA", "LUCAS SANTOS"] },
  { nome: "300+", membros: ["SABRINA SILVA", "EMANUEL PEREIRA"] },
  { nome: "Hunter", membros: ["ALEXSANDRA WHENDELL", "VICTOR MEDEIROS", "GABRIEL VINICIUS"] }
];
const CATEGORIAS_FARMERS = [
  { nome: "Farmer CF P - Func.", membros: ["ANDERSON CARLOS", "MARCELO MOREIRA", "ANA BEATRIZ"] },
  { nome: "Farmer CF P - Sócios", membros: ["GUILHERME MATIAS", "CLEYTON ANDRADE"] },
  { nome: "Farmer CF G - Func.", membros: ["WALTER GALDINO", "ANDERSON GABRIEL"] },
  { nome: "Farmer CF G - Sócios", membros: ["VINICIUS BARROS", "LUIZ CAVALCANTE"] }
];
const CATEGORIAS_RESTO = [
  { nome: "Agência", membros: ["PEDRO MARANHÃO", "LUCAS MATHEUS"] },
  { nome: "Revendedor", membros: ["JONATHAN SILVA", "YURI PINHEIRO"] },
  { nome: "Brindeiro", membros: ["STEPHANIE OLIVEIRA"] }
];

function normalizar(s) {
  return String(s || "").toUpperCase().normalize("NFD").replace(/[̀-ͯ]/g, "").trim();
}

// Tolera variações de nome entre a lista do Felipe e a planilha
// (ex: "EMILY" na planilha vs "EMILY DANTAS" na lista; "P MARANHAO" vs "PEDRO MARANHÃO")
function encontrarVendedor(nomeBusca, todosVendedores) {
  const alvo = normalizar(nomeBusca);
  let achado = todosVendedores.find(v => normalizar(v.nome) === alvo);
  if (achado) return achado;
  const palavrasAlvo = alvo.split(/\s+/).filter(p => p.length >= 3);
  achado = todosVendedores.find(v => {
    const palavrasV = normalizar(v.nome).split(/\s+/).filter(p => p.length >= 3);
    return palavrasV.some(p => palavrasAlvo.includes(p));
  });
  return achado || null;
}

function subCardHtml(categoria, todosVendedores, ritmoEsperado, variante) {
  const membros = categoria.membros
    .map(nome => encontrarVendedor(nome, todosVendedores))
    .filter(Boolean);
  if (!membros.length) return "";
  const ordenados = [...membros].sort((a, b) => b.pct - a.pct);
  const maxPct = Math.max(...ordenados.map(v => v.pct), 0.0001);
  const linhas = ordenados.map(v => {
    const ratio = ritmoEsperado > 0 ? v.pct / ritmoEsperado : 1;
    const status = statusFromRatio(ratio);
    const cor = "var(--" + status + ")";
    const largura = Math.max((v.pct / maxPct) * 100, 3);
    return `
      <div class="subcard-row">
        <div class="subcard-avatar">${getInitials(v.nome)}</div>
        <div class="subcard-nome" title="${v.nome}">${v.nome}</div>
        <div class="subcard-bar-wrap"><div class="subcard-bar-fill" style="width:${largura}%; background:${cor}"></div></div>
        <div class="subcard-pct">${fmtPct(v.pct)}</div>
      </div>
    `;
  }).join("");
  const classeExtra = variante ? ' subcard--' + variante : '';
  return `
    <div class="subcard${classeExtra}">
      <div class="subcard-title">${categoria.nome}</div>
      ${linhas}
    </div>
  `;
}

function ladderHtml(meta, fat) {
  const tiers = [70, 80, 90, 100, 110, 120, 130, 140];
  let proximoMarcado = false;
  return tiers.map(t => {
    const faltaVal = (meta * t / 100) - fat;
    const isProximo = !proximoMarcado && faltaVal > 0;
    if (isProximo) proximoMarcado = true;
    const faltaTxt = faltaVal > 0 ? fmtBRL(faltaVal) : "batido ✓";
    return `
      <div class="chip ${isProximo ? 'proximo' : ''}">
        <div class="tier">${t}% da meta</div>
        <div class="valor">${faltaTxt}</div>
      </div>
    `;
  }).join("");
}

function desenharGrafico(canvasId, chartRefSetter, chartRefAtual, vendedores, ritmoEsperado) {
  if (chartRefAtual) chartRefAtual.destroy();
  const ctx = document.getElementById(canvasId).getContext("2d");
  const ordenado = [...vendedores].sort((a, b) => b.pct - a.pct);
  const cores = ordenado.map(v => {
    const ratio = ritmoEsperado > 0 ? v.pct / ritmoEsperado : 1;
    return statusCor(statusFromRatio(ratio));
  });
  const maiorValor = Math.max(...ordenado.map(v => v.pct * 100), 10);
  const chart = new Chart(ctx, {
    type: "bar",
    plugins: [ChartDataLabels],
    data: {
      labels: ordenado.map(v => v.nome),
      datasets: [{
        data: ordenado.map(v => +(v.pct * 100).toFixed(1)),
        backgroundColor: cores,
        borderRadius: 8,
        barPercentage: 0.62,
        categoryPercentage: 0.78
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 26 } },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: (ctx) => ctx.parsed.y.toLocaleString("pt-BR", { minimumFractionDigits: 1 }) + "%" }
        },
        datalabels: {
          anchor: "end",
          align: "top",
          color: corTexto(),
          font: { weight: "700", size: 12 },
          formatter: (v) => v.toLocaleString("pt-BR", { minimumFractionDigits: 1 }) + "%"
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          suggestedMax: maiorValor * 1.18,
          ticks: { color: corTextoSub(), callback: (v) => v + "%" },
          grid: { color: corGrid() }
        },
        x: {
          ticks: { color: corTexto(), font: { size: 12 }, maxRotation: 40, minRotation: 0 },
          grid: { display: false }
        }
      }
    }
  });
  chartRefSetter(chart);
}

function render(dados) {

  const gcStatus = statusFromRatio(ritmoEsperado > 0 ? gc.pct / ritmoEsperado : 1);

          <div class="hero-num" style="color: var(--${status === 'vermelho' ? 'vermelho' : status === 'ambar' ? 'ambar' : 'verde'})">${fmtPct(pctAtual)}</div>
          <div class="hero-sub">${fmtBRL(totalFat)} faturado de ${fmtBRL(totalMeta)} de meta semanal</div>

      </div>

        <div class="bar-marker" style="left:${markerPct}%"></div>
        <div class="bar-marker-label" style="left:${markerPct}%">ritmo ${fmtPct(ritmoEsperado)}</div>
      </div>
      <div class="bar-legend"><span>0%</span><span>100% da meta</span></div>
    </div>

    <div class="card ladder">
      <div class="card-label">🪜 Régua — quanto falta para bater cada patamar da meta</div>
      <div class="ladder-row">${ladderHtml(totalMeta, totalFat)}</div>
    </div>

    <div class="card rank-card rank-card--destaque">
      <div class="card-label"><span class="dot dot-dourado"></span> Top Closer (Inside Sales)</div>
      <div class="group-total">
        <div class="pct" style="color:var(--${closerStatus === 'vermelho' ? 'vermelho' : closerStatus === 'ambar' ? 'ambar' : 'verde'})">${fmtPct(closer.pct)}</div>
        <div class="desc">${fmtBRL(closer.fat)} de ${fmtBRL(closer.meta)} de meta do grupo</div>
      </div>
      ${podiumHtml(closer.top3, "avatar-dourado")}
    </div>

    <div class="card rank-card rank-card--destaque">
      <div class="card-label"><span class="dot dot-dourado"></span> Top GC (Gestão de Contas)</div>
      <div class="group-total">
        <div class="pct" style="color:var(--${gcStatus === 'vermelho' ? 'vermelho' : gcStatus === 'ambar' ? 'ambar' : 'verde'})">${fmtPct(gc.pct)}</div>
        <div class="desc">${fmtBRL(gc.fat)} de ${fmtBRL(gc.meta)} de meta do grupo</div>
      </div>
      ${podiumHtml(gc.top3, "avatar-dourado")}
    </div>

    <div class="subcards-grid-topo">
      ${CATEGORIAS_TOPO.map(cat => subCardHtml(cat, vendedores, ritmoEsperado, "grande")).join("")}
    </div>
    <div class="subcards-wrap">
      ${CATEGORIAS_FARMERS.map(cat => subCardHtml(cat, vendedores, ritmoEsperado, "media")).join("")}
    </div>
    <div class="subcards-wrap">
      ${CATEGORIAS_RESTO.map(cat => subCardHtml(cat, vendedores, ritmoEsperado, "grande")).join("")}

    <div class="card chart-card">
      <div class="card-label"><span class="dot dot-azul"></span> % da meta individual — Closer (Falcons + Stark)</div>
      <div class="chart-wrap"><canvas id="chartCloser"></canvas></div>
    </div>

      <div class="chart-wrap"><canvas id="chartGC"></canvas></div>
    </div>

    <div class="footer">
      Fonte: aba "Cópia de Gráfico Semanal TV - Premium" via Apps Script · atualiza a cada ~10 min ·
      Falcons/Stark = squads Closer (Inside Sales) · Maverick/Nexus = squads GC (Gestão de Contas) ·

  desenharGrafico("chartCloser", (c) => { chartCloser = c; }, chartCloser, closer.todos, ritmoEsperado);
  desenharGrafico("chartGC", (c) => { chartGC = c; }, chartGC, gc.todos, ritmoEsperado);

function jsonpRequest(url) {
  return new Promise((resolve, reject) => {
    const callbackName = "painelCallback_" + Date.now() + "_" + Math.floor(Math.random() * 1e6);
    const script = document.createElement("script");
    let timeoutId;

    function cleanup() {
      clearTimeout(timeoutId);
      delete window[callbackName];
      script.remove();
    }

    window[callbackName] = function(data) {
      resolve(data);
      cleanup();
    };
    script.onerror = function() {
      reject(new Error("Falha ao carregar o Apps Script (verifique a URL/deploy)"));
      cleanup();
    };
    timeoutId = setTimeout(function() {
      reject(new Error("Tempo esgotado aguardando resposta do Apps Script"));
      cleanup();
    }, 25000);

    const sep = url.includes("?") ? "&" : "?";
    script.src = url + sep + "callback=" + callbackName + "&_=" + Date.now();
    document.body.appendChild(script);
  });
}

async function carregarDados() {
  try {
    const payload = await jsonpRequest(APPS_SCRIPT_URL);
    if (payload.error) throw new Error(payload.error);
    const dados = parseDados(payload);
    render(dados);
  } catch (e) {
    // Só mostra a tela de erro se ainda não tiver nenhum dado carregado antes —
    // assim uma falha passageira não apaga um painel que já estava funcionando.
    if (!ultimoDados) {
      document.getElementById("conteudo").innerHTML = `<div class="empty-msg" style="grid-column:span 12;">
        Erro ao carregar dados: ${e.message || e}<br>
        Verifique se a URL do Apps Script está correta e se o deploy está com acesso "Qualquer pessoa".
      </div>`;
    }
    console.error("Erro ao carregar painel:", e);
    setTimeout(carregarDados, 30000); // tenta de novo em 30s, não espera os 10 min do ciclo normal
  }
}

// ===== Auto-scroll por "páginas": nunca para com um card cortado =====
// Em vez de rolar pixel a pixel contínuo, calcula os pontos onde cada linha
// de cards termina e só pausa exatamente nessas bordas — cada pausa mostra
// só cards inteiros. A transição entre páginas é rápida (não é o momento de leitura).
const PAUSA_PAGINA_MS = 20000;  // quanto tempo fica parado em cada página (tempo de leitura)
const TRANSICAO_MS = 10000;     // duração do "salto" suave até a próxima página

let autoScrollIniciado = false;
let paginasScroll = [0];
let paginaAtual = 0;
let direcaoPagina = 1; // 1 = avançando, -1 = voltando (vai e volta passando por todas, sem pular a do meio)
let timerProximaPagina = null;

// Páginas fixas por seção (não é mais cálculo automático por altura):
// Página 1 = topo até os cards Top Closer/Top GC · Página 2 = sub cards de perfil ·
// Página 3 = os dois gráficos individuais.
function calcularPaginasScroll() {
  const container = document.getElementById("conteudo");
  if (!container) return [0];
  const subcards = container.querySelector(".subcards-grid-topo");
  const primeiroGrafico = container.querySelector(".chart-card");
  const paginas = [0];
  if (subcards) paginas.push(subcards.offsetTop);
  if (primeiroGrafico) paginas.push(primeiroGrafico.offsetTop);
  return paginas;
}

function animarScrollPara(destino, aoTerminar) {
  const origem = window.scrollY;
  const inicioMs = Date.now();
  function passo() {
    const t = Math.min((Date.now() - inicioMs) / TRANSICAO_MS, 1);
    window.scrollTo(0, origem + (destino - origem) * t);
    if (t < 1) requestAnimationFrame(passo);
    else if (aoTerminar) aoTerminar();
  }
  requestAnimationFrame(passo);
}

function agendarProximaPagina() {
  clearTimeout(timerProximaPagina);
  timerProximaPagina = setTimeout(avancarPagina, PAUSA_PAGINA_MS);
}

function avancarPagina() {
  paginasScroll = calcularPaginasScroll(); // recalcula sempre — conteúdo muda a cada atualização de dados
  const ultimoIndice = paginasScroll.length - 1;
  if (ultimoIndice <= 0) {
    agendarProximaPagina();
    return;
  }
  // Vai e volta (1º → meio → último → meio → 1º → ...), nunca pula direto do último pro primeiro
  if (paginaAtual + direcaoPagina > ultimoIndice || paginaAtual + direcaoPagina < 0) {
    direcaoPagina *= -1;
  }
  paginaAtual += direcaoPagina;
  animarScrollPara(paginasScroll[paginaAtual], agendarProximaPagina);
}

function iniciarAutoScroll() {
  if (autoScrollIniciado) return;
  autoScrollIniciado = true;
  paginasScroll = calcularPaginasScroll();
  paginaAtual = 0;
  direcaoPagina = 1;
  window.scrollTo(0, 0);
  agendarProximaPagina();
}

(function sincronizarBotaoTema() {
  const tema = document.documentElement.getAttribute("data-theme") || "dark";
  const btn = document.getElementById("btnTema");
  if (btn) btn.textContent = tema === "dark" ? "☀️ Tema claro" : "🌙 Tema escuro";
})();

carregarDados();
setInterval(carregarDados, REFRESH_MS);
setTimeout(iniciarAutoScroll, 1500); // dá tempo do primeiro carregamento renderizar antes de começar a rolar
